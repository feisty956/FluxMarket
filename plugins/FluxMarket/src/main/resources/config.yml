sell:
  gui-enabled: true
  worth-lore: true
  actionbar-feedback: true
  sound: ENTITY_EXPERIENCE_ORB_PICKUP
  shulker-support: true
  history-size: 20
  selltop-size: 10          # How many players appear on /selltop
  allow-any-item: false       # Allow selling items not listed in the shop (uses default-price)
  default-price: 1.0          # Default sell price for items not in shop categories

  # Sell Wands
  wands:
    enabled: true
    default-uses: 5000       # Uses for a use-based wand
    default-duration-days: 3 # Duration for a time-based wand

  # Sell Progression — 20 tiers per category, multipliers stack on top of rank multipliers
  progression:
    enabled: true
    max-multiplier: 1.25
    # threshold = cumulative $ earned in that category to reach this tier
    tiers:
      1:  {threshold: 0,           multiplier: 1.00}
      2:  {threshold: 500,         multiplier: 1.01}
      3:  {threshold: 1500,        multiplier: 1.02}
      4:  {threshold: 3000,        multiplier: 1.03}
      5:  {threshold: 5000,        multiplier: 1.04}
      6:  {threshold: 10000,       multiplier: 1.05}
      7:  {threshold: 20000,       multiplier: 1.06}
      8:  {threshold: 40000,       multiplier: 1.07}
      9:  {threshold: 75000,       multiplier: 1.08}
      10: {threshold: 125000,      multiplier: 1.10}
      11: {threshold: 200000,      multiplier: 1.11}
      12: {threshold: 350000,      multiplier: 1.12}
      13: {threshold: 600000,      multiplier: 1.13}
      14: {threshold: 1000000,     multiplier: 1.14}
      15: {threshold: 2000000,     multiplier: 1.15}
      16: {threshold: 5000000,     multiplier: 1.17}
      17: {threshold: 10000000,    multiplier: 1.19}
      18: {threshold: 25000000,    multiplier: 1.21}
      19: {threshold: 75000000,    multiplier: 1.23}
      20: {threshold: 200000000,   multiplier: 1.25}

auction:
  max-listings: 5
  default-duration-hours: 48
  min-price: 1.0
  max-price: 1000000.0
  listing-tax-percent: 5.0
  sale-tax-percent: 2.0
  anti-snipe-seconds: 30
  expired-cleanup-days: 7
  shulker-preview: true
  history-size: 50           # Transaction history entries per player
  emergency-disable: false   # Set true to disable all AH activity (admin toggle)

orders:
  max-orders: 3
  default-expiry-hours: 72
  min-price: 1.0
  partial-delivery: true
  shulker-delivery: true

flux:
  update-interval-minutes: 15
  transaction-window-hours: 6
  decay-lambda: 0.3
  history-cleanup-days: 7
  defaults:
    max-swing: 0.4
    sensitivity: 0.5
    spread: 0.1
  events:
    enabled: true
    check-interval-minutes: 60
    crash:
      enabled: true
      chance: 0.05
      duration-minutes: 30
      max-drop: 0.6
    boom:
      enabled: true
      chance: 0.05
      duration-minutes: 30
      max-rise: 0.8
    tax-day:
      enabled: true
      chance: 0.03
      duration-minutes: 30
      sell-reduction: 0.15

# Discord Webhook — leave url empty to disable
webhook:
  url: ""                      # Discord webhook URL
  min-sale-amount: 10000.0     # Only notify for AH sales above this amount
  notify-flux-events: true     # Notify on CRASH / BOOM market events
  notify-selltop-changes: false

multipliers:
  vip:
    permission: "fluxmarket.multiplier.vip"
    sell-multiplier: 1.2
  mvp:
    permission: "fluxmarket.multiplier.mvp"
    sell-multiplier: 1.5

discounts:
  vip:
    permission: "fluxmarket.discount.vip"
    buy-discount: 0.1
