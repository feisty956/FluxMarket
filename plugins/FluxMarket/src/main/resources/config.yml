# ==========================================
#         FluxMarket — Configuration
# ==========================================

modules:
  shop: true
  sell: true
  auction: true
  orders: true
  flux: true

database:
  type: sqlite   # sqlite | mysql
  mysql:
    host: localhost
    port: 3306
    database: fluxmarket
    username: root
    password: ""

messages:
  prefix: "&8[&6FluxMarket&8] &r"
  no-permission: "&cYou don't have permission to do that."
  module-disabled: "&cThis module is disabled."
  player-only: "&cOnly players can use this command."
  reload-success: "&aConfiguration reloaded successfully."

shop:
